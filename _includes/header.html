{% include calculate_relative_base.html %}
{% include escape-404.html %}

<!-- Premium Sticky Header -->
<header class="main-header" role="banner">
  <div class="header-inner">

    <!-- Left: Branding -->
    <a href="{{ relativebase }}" class="nav-branding" aria-label="Home">
      <img src="{{ site.logo | prepend: relativebase }}" alt="{{ site.title }} logo"
        style="height: 38px; width: auto; max-width: 140px; display: block;">
    </a>

    <!-- Right: Desktop Navigation -->
    <nav class="nav-desktop site-nav" aria-label="Main Navigation">
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}"
        data-text="Articles">Articles</a>
      <a href="{{ '/research.html' | relative_url }}"
        class="nav-link {% if page.url contains 'research' %}active{% endif %}" data-text="Research">Research</a>
      <a href="{{ '/about.html' | relative_url }}" class="nav-link {% if page.url contains 'about' %}active{% endif %}"
        data-text="About">About</a>

      <!-- Glowing Subscribe CTA -->
      <button class="nav-btn-subscribe subscribe-trigger">Subscribe</button>
    </nav>

    <!-- Mobile Burger Toggle -->
    <button class="nav-mobile-toggle" aria-label="Open Menu">
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </button>
  </div>
</header>

<!-- Full-screen Mobile Menu Overlay -->
<div class="mobile-menu-overlay" aria-hidden="true">
  <nav class="mobile-nav-links">
    <a href="{{ relativebase }}">Home</a>
    <a href="{{ '/' | relative_url }}">Articles</a>
    <a href="{{ '/research.html' | relative_url }}">Research</a>
    <a href="{{ '/about.html' | relative_url }}">About</a>
    <button class="mobile-nav-subscribe subscribe-trigger">Subscribe</button>
  </nav>
</div>
