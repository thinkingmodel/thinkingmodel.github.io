{% include calculate_relative_base.html %}
{% include escape-404.html %}

<!-- Premium Sticky Header -->
<header class="main-header" role="banner">
  <div class="header-inner">

    <!-- Left: Branding -->
    <a href="{{ relativebase }}" class="nav-branding" aria-label="Home">
      <span class="nav-mono">TTM</span>
      <span class="nav-serif">The Thinking Model</span>
    </a>

    <!-- Right: Desktop Navigation -->
    <nav class="nav-desktop" aria-label="Main Navigation">
      <a href="{{ relativebase }}archive.html" class="nav-link" data-text="All Posts">All Posts</a>
      <a href="{{ relativebase }}tags.html" class="nav-link" data-text="Tags">Tags</a>
      <a href="{{ relativebase }}about.html" class="nav-link" data-text="About">About</a>

      <!-- Theme/Reading mode toggle -->
      <button class="nav-toggle-mode" aria-label="Toggle Reading Mode" title="Reading Mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" style="width:16px;height:16px;">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>

      <!-- Glowing Subscribe CTA -->
      <a href="{{ site.mailchimp | default: '#' }}" class="nav-btn-subscribe subscribe-btn" target="_blank"
        rel="noopener">Subscribe</a>
    </nav>

    <!-- Mobile Burger Toggle -->
    <button class="nav-mobile-toggle" aria-label="Open Menu">
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </button>
  </div>
</header>

<!-- Full-screen Mobile Menu Overlay -->
<div class="mobile-menu-overlay" aria-hidden="true">
  <nav class="mobile-nav-links">
    <a href="{{ relativebase }}">Home</a>
    <a href="{{ relativebase }}archive.html">All Posts</a>
    <a href="{{ relativebase }}tags.html">Tags</a>
    <a href="{{ relativebase }}about.html">About</a>
    <a href="{{ site.mailchimp | default: '#' }}" class="mobile-nav-subscribe" target="_blank">Subscribe</a>
  </nav>
</div>
