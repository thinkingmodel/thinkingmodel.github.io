<canvas id="starfield-canvas" aria-hidden="true"></canvas>
<script>
    (function () {
        'use strict';
        var canvas = document.getElementById('starfield-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var stars = [];
        var NUM_STARS = 220;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initStars() {
            stars = [];
            for (var i = 0; i < NUM_STARS; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.4 + 0.4,          // 0.4 – 1.8 px
                    base: Math.random() * 0.55 + 0.25,         // base opacity 0.25 – 0.80
                    speed: Math.random() * 0.012 + 0.005,       // twinkle speed
                    phase: Math.random() * Math.PI * 2          // random start phase
                });
            }
        }

        var tick = 0;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            tick += 1;
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                var alpha = s.base + 0.18 * Math.sin(tick * s.speed + s.phase);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(232,230,240,' + alpha.toFixed(3) + ')';
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        resize();
        initStars();
        draw();

        window.addEventListener('resize', function () {
            resize();
            initStars();
        });
    })();
</script>
