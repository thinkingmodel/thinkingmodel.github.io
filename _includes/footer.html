{% include calculate_relative_base.html %}
{% include escape-404.html %}

<footer class="main-footer" role="contentinfo">
    <!-- Gradient divider -->
    <div
        style="height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.5),transparent);margin-bottom:0;">
    </div>

    <!-- Single-line compact footer -->
    <div class="wrapper"
        style="padding-top:1.5rem;padding-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1.5rem;">

        <!-- Left: Logo & copyright -->
        <div style="display:flex;align-items:center;gap:1.5rem;">
            <a class="logo-link" title="{{ site.title }}" href="{{ relativebase }}"
                style="display:flex;align-items:center;">
                <img src="{{ site.logo | prepend: relativebase }}" alt="{{ site.title }} logo"
                    style="height: 24px; width: auto; opacity: 0.8;">
            </a>
            <p
                style="font-family:var(--font-mono);font-size:.62rem;letter-spacing:.1em;color:var(--ink-low);margin:0;line-height:1;">
                © <span id="copyright-year">{{ site.time | date: '%Y' }}</span> {{ site.author }}
            </p>
        </div>

        <!-- Center/Right: Nav links & Socials -->
        <div style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap;">
            <!-- Nav -->
            <nav style="display:flex;gap:1.5rem;">
                <a href="{{ relativebase }}"
                    style="font-family:var(--font-mono);font-size:.62rem;letter-spacing:.1em;color:var(--ink-mid);text-decoration:none;text-transform:uppercase;transition:color .25s;"
                    onmouseover="this.style.color='var(--nebula)'"
                    onmouseout="this.style.color='var(--ink-mid)'">Home</a>
                <a href="{{ relativebase }}archive.html"
                    style="font-family:var(--font-mono);font-size:.62rem;letter-spacing:.1em;color:var(--ink-mid);text-decoration:none;text-transform:uppercase;transition:color .25s;"
                    onmouseover="this.style.color='var(--nebula)'"
                    onmouseout="this.style.color='var(--ink-mid)'">Archive</a>
                <a href="{{ relativebase }}tags.html"
                    style="font-family:var(--font-mono);font-size:.62rem;letter-spacing:.1em;color:var(--ink-mid);text-decoration:none;text-transform:uppercase;transition:color .25s;"
                    onmouseover="this.style.color='var(--nebula)'"
                    onmouseout="this.style.color='var(--ink-mid)'">Tags</a>
                <a href="{{ relativebase }}about.html"
                    style="font-family:var(--font-mono);font-size:.62rem;letter-spacing:.1em;color:var(--ink-mid);text-decoration:none;text-transform:uppercase;transition:color .25s;"
                    onmouseover="this.style.color='var(--nebula)'"
                    onmouseout="this.style.color='var(--ink-mid)'">About</a>
            </nav>

            <!-- Social -->
            <div style="display:flex;gap:1rem;border-left:1px solid rgba(167,139,250,.2);padding-left:2rem;">
                {% if site.twitter %}<a href="https://twitter.com/{{ site.twitter | remove:'@' }}"
                    style="color:var(--ink-low);transition:color .25s;" onmouseover="this.style.color='var(--nebula)'"
                    onmouseout="this.style.color='var(--ink-low)'" aria-label="Twitter"><i
                        class="fa fa-twitter"></i></a>{% endif %}
                {% if site.github %}<a href="https://github.com/{{ site.github }}"
                    style="color:var(--ink-low);transition:color .25s;" onmouseover="this.style.color='var(--nebula)'"
                    onmouseout="this.style.color='var(--ink-low)'" aria-label="GitHub"><i
                        class="fa fa-github"></i></a>{% endif %}
                {% if site.linkedin %}<a href="https://linkedin.com/in/{{ site.linkedin }}"
                    style="color:var(--ink-low);transition:color .25s;" onmouseover="this.style.color='var(--nebula)'"
                    onmouseout="this.style.color='var(--ink-low)'" aria-label="LinkedIn"><i
                        class="fa fa-linkedin"></i></a>{% endif %}
                {% if site.instagram %}<a href="https://instagram.com/{{ site.instagram }}"
                    style="color:var(--ink-low);transition:color .25s;" onmouseover="this.style.color='var(--nebula)'"
                    onmouseout="this.style.color='var(--ink-low)'" aria-label="Instagram"><i
                        class="fa fa-instagram"></i></a>{% endif %}
            </div>
        </div>

    </div>
</footer>
